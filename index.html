<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carnet d'entraînement — version améliorée</title>
  <style>
    :root{
      --bg:#f7f9fc;
      --bg2:#eef4ff;
      --card:rgba(255,255,255,.92);
      --text:#172033;
      --muted:#64748b;
      --border:#e5eaf3;
      --shadow:0 14px 34px rgba(15,23,42,.08);
      --shadow-soft:0 8px 24px rgba(15,23,42,.06);
      --radius:24px;
      --radius-sm:18px;
      --dark:#111827;
      --blue:#2563eb;
      --blue-soft:#dbeafe;
      --teal:#0f766e;
      --teal-soft:#ccfbf1;
      --green:#059669;
      --green-soft:#d1fae5;
      --amber:#d97706;
      --amber-soft:#fef3c7;
      --red:#dc2626;
      --red-soft:#fee2e2;
      --violet:#7c3aed;
      --violet-soft:#ede9fe;
      --pink:#db2777;
      --pink-soft:#fce7f3;
      --slate:#475569;
      --slate-soft:#f1f5f9;
      --pecs:#3b82f6;
      --back:#8b5cf6;
      --shoulders:#f59e0b;
      --biceps:#10b981;
      --triceps:#ef4444;
      --legs:#6366f1;
      --abs:#14b8a6;
      --rear:#ec4899;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(96,165,250,.18), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(167,139,250,.16), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(16,185,129,.10), transparent 30%),
        linear-gradient(180deg, #f7f9fc 0%, #eef4ff 100%);
      min-height:100vh;
    }
    button,input,select,textarea{font:inherit}
    .wrap{max-width:1180px;margin:0 auto;padding:0 18px}
    .hidden{display:none !important}
    .small{font-size:12px}
    .muted{color:var(--muted)}
    .mono{font-variant-numeric:tabular-nums}

    header{
      position:sticky;top:0;z-index:30;
      backdrop-filter:blur(18px);
      background:rgba(255,255,255,.78);
      border-bottom:1px solid rgba(229,234,243,.85);
    }
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 0 10px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:48px;height:48px;border-radius:18px;
      background:linear-gradient(135deg,#111827,#334155);
      color:#fff;display:grid;place-items:center;
      font-size:22px;box-shadow:var(--shadow-soft)
    }
    h1{margin:0;font-size:20px;line-height:1.05}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

    button, .filelabel, .ghost-btn{
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:10px 14px;
      font-weight:750;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(15,23,42,.04);
      transition:.18s ease;
    }
    button:hover,.filelabel:hover,.ghost-btn:hover{transform:translateY(-1px);filter:brightness(.99)}
    button.primary{background:linear-gradient(135deg,#111827,#1f2937);border-color:#111827;color:#fff}
    button.soft{background:var(--blue-soft);color:#1d4ed8;border-color:#bfdbfe}
    button.success{background:var(--green-soft);color:#047857;border-color:#a7f3d0}
    button.warn{background:var(--amber-soft);color:#a16207;border-color:#fde68a}
    button.danger{background:var(--red-soft);color:#b91c1c;border-color:#fecaca}
    input[type=file]{display:none}

    .tabs{display:flex;gap:8px;overflow:auto;padding:0 0 12px}
    .tab{white-space:nowrap;box-shadow:none;background:#fff;color:var(--muted)}
    .tab.active{background:linear-gradient(135deg,#111827,#1f2937);border-color:#111827;color:#fff}

    main{padding:22px 0 84px}
    .grid{display:grid;gap:16px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .cards4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

    .card{
      background:var(--card);
      border:1px solid rgba(229,234,243,.92);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .card.pad{padding:20px}
    .section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:12px}
    h2{margin:0;font-size:28px;letter-spacing:-.03em}
    h3{margin:0;font-size:18px}

    .hero{
      padding:22px;
      display:grid;
      grid-template-columns:1.2fr .9fr;
      gap:18px;
      align-items:stretch;
    }
    .hero-main{
      border-radius:22px;
      padding:24px;
      min-height:220px;
      color:#fff;
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, #1d4ed8 0%, #2563eb 42%, #7c3aed 100%);
    }
    .hero-main::before,.hero-main::after{
      content:"";position:absolute;border-radius:999px;opacity:.26;pointer-events:none;
    }
    .hero-main::before{width:240px;height:240px;background:#fff;right:-60px;top:-90px}
    .hero-main::after{width:160px;height:160px;background:#fff;left:-30px;bottom:-70px}
    .hero-main .eyebrow,.session-cover .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.18);font-weight:800;font-size:12px}
    .hero-title{margin-top:16px;font-size:30px;font-weight:900;line-height:1.03;max-width:12ch;position:relative;z-index:1}
    .hero-desc{margin-top:10px;max-width:50ch;color:rgba(255,255,255,.86);position:relative;z-index:1}
    .hero-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
    .hero-chip{padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);min-width:110px}
    .hero-chip b{display:block;font-size:18px}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
    .hero-actions button{box-shadow:none}

    .hero-side{display:grid;gap:16px}
    .mini-card{padding:18px;border-radius:22px;background:rgba(255,255,255,.92);border:1px solid var(--border);box-shadow:var(--shadow-soft)}
    .mini-card h3{font-size:17px}
    .mini-card p{margin:6px 0 0}

    .pill{
      display:inline-flex;align-items:center;gap:6px;
      border-radius:999px;padding:6px 10px;font-size:12px;font-weight:850;
      background:var(--slate-soft);color:#475569;
    }
    .pill.blue{background:var(--blue-soft);color:#1d4ed8}
    .pill.green{background:var(--green-soft);color:#047857}
    .pill.amber{background:var(--amber-soft);color:#a16207}
    .pill.red{background:var(--red-soft);color:#b91c1c}
    .pill.violet{background:var(--violet-soft);color:#6d28d9}
    .pill.pink{background:var(--pink-soft);color:#be185d}
    .pill.teal{background:var(--teal-soft);color:#0f766e}

    .kpi{
      padding:18px;border-radius:20px;border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-soft)
    }
    .kpi .label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .kpi .value{font-size:30px;font-weight:900;letter-spacing:-.03em;margin-top:6px}
    .kpi .delta{margin-top:8px;color:var(--muted);font-size:13px}

    .session-cover{
      min-height:170px;
      display:flex;align-items:flex-end;
      padding:20px;position:relative;overflow:hidden;color:#fff;
      border-radius:24px;
    }
    .session-cover::before,.session-cover::after{content:"";position:absolute;border-radius:999px;pointer-events:none;opacity:.22;background:#fff}
    .session-cover::before{width:180px;height:180px;top:-80px;right:-50px}
    .session-cover::after{width:130px;height:130px;left:-25px;bottom:-48px}
    .session-cover .content{position:relative;z-index:1}
    .session-cover h2{font-size:30px;color:#fff}
    .session-cover p{margin-top:8px;color:rgba(255,255,255,.84)}
    .session-cover.push{background:linear-gradient(135deg,#fb923c,#f97316,#ef4444)}
    .session-cover.pull{background:linear-gradient(135deg,#6366f1,#8b5cf6,#7c3aed)}
    .session-cover.legs{background:linear-gradient(135deg,#06b6d4,#14b8a6,#22c55e)}
    .session-cover.upper{background:linear-gradient(135deg,#3b82f6,#2563eb,#0ea5e9)}
    .session-cover.arms{background:linear-gradient(135deg,#ec4899,#db2777,#8b5cf6)}

    .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:12px;font-weight:850;color:#667085}
    input,select,textarea{
      width:100%;margin-top:6px;padding:12px 13px;border-radius:16px;border:1px solid var(--border);background:#fff;color:var(--text);outline:none;
      box-shadow:0 2px 6px rgba(15,23,42,.03) inset;
    }
    input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.13)}

    .exercise-card{overflow:hidden}
    .exercise-top{
      display:grid;grid-template-columns:98px 1fr auto;gap:14px;align-items:center;
      padding:18px;border-bottom:1px solid var(--border);
      background:linear-gradient(180deg,#fff,#fbfcff);
    }
    .exercise-visual{
      height:92px;border-radius:22px;display:grid;place-items:center;
      color:#fff;font-size:38px;font-weight:900;box-shadow:var(--shadow-soft)
    }
    .visual-pecs{background:linear-gradient(135deg,var(--pecs),#60a5fa)}
    .visual-dos{background:linear-gradient(135deg,var(--back),#a78bfa)}
    .visual-épaules,.visual-epaules{background:linear-gradient(135deg,var(--shoulders),#fbbf24)}
    .visual-biceps{background:linear-gradient(135deg,var(--biceps),#34d399)}
    .visual-triceps{background:linear-gradient(135deg,var(--triceps),#fb7185)}
    .visual-jambes{background:linear-gradient(135deg,var(--legs),#818cf8)}
    .visual-abdos{background:linear-gradient(135deg,var(--abs),#2dd4bf)}
    .visual-deltoïde-postérieur,.visual-deltoide-postérieur,.visual-deltoide-posterieur,.visual-deltoïde-posterieur{background:linear-gradient(135deg,var(--rear),#f472b6)}
    .exercise-meta p{margin-top:6px;color:var(--muted)}
    .suggestion{
      background:#fff;border:1px solid var(--border);padding:12px 14px;border-radius:18px;min-width:155px;box-shadow:var(--shadow-soft)
    }
    .suggestion .label{font-size:12px;color:var(--muted)}
    .suggestion b{display:block;margin-top:4px;font-size:22px;letter-spacing:-.02em}
    .exercise-body{padding:18px;display:grid;grid-template-columns:1fr 1.2fr auto;gap:12px;align-items:end}
    .cols2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .cols4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .exercise-footer{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:0 18px 18px;flex-wrap:wrap}
    .exercise-tip{color:var(--muted);font-size:13px;max-width:68ch}
    .last-result{font-size:13px;color:var(--muted)}

    .coach-grid{display:grid;grid-template-columns:1.2fr .9fr;gap:16px}
    .coach-card{padding:18px}
    .insight-list{display:grid;gap:12px}
    .insight{
      padding:16px;border-radius:20px;border:1px solid var(--border);background:#fff;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow-soft)
    }
    .insight-icon{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-size:20px;flex:0 0 auto}
    .icon-progress{background:var(--green-soft)}
    .icon-fatigue{background:var(--red-soft)}
    .icon-volume{background:var(--amber-soft)}
    .icon-measure{background:var(--blue-soft)}
    .icon-regularity{background:var(--violet-soft)}
    .icon-focus{background:var(--teal-soft)}
    .insight h3{font-size:16px;margin:0}
    .insight p{margin:6px 0 0;color:var(--muted);line-height:1.45}

    .timeline{display:grid;gap:12px}
    .log-item{padding:18px;display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .log-head{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .log-item h3{font-size:18px}

    .barrow{display:grid;grid-template-columns:120px 1fr 45px;gap:10px;align-items:center;margin:10px 0}
    .bar{height:14px;background:var(--slate-soft);border-radius:999px;overflow:hidden}
    .bar span{display:block;height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6,#10b981);border-radius:999px}

    .record-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
    .record-card{padding:16px;border:1px solid var(--border);border-radius:20px;background:#fff;box-shadow:var(--shadow-soft)}
    .record-card .value{font-size:26px;font-weight:900;letter-spacing:-.03em;margin-top:6px}

    canvas{width:100%;height:260px;border-radius:18px;background:#fff}

    .measure-card{padding:18px}
    .measure-row{
      display:grid;grid-template-columns:1.05fr repeat(6,1fr) auto;gap:8px;align-items:end;
      padding:16px;border:1px solid var(--border);border-radius:20px;background:#fff;box-shadow:var(--shadow-soft)
    }

    .program-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .program-card{padding:18px}
    .program-ex{border:1px solid var(--border);border-radius:18px;padding:14px;background:#fff;margin-top:12px;box-shadow:var(--shadow-soft)}

    .empty{padding:32px;text-align:center;color:var(--muted)}
    .footer-note{margin-top:12px;text-align:center;color:var(--muted);font-size:12px}

    .mobile-actions{
      position:fixed;left:12px;right:12px;bottom:12px;z-index:25;
      background:rgba(255,255,255,.85);backdrop-filter:blur(14px);
      border:1px solid rgba(229,234,243,.96);border-radius:22px;padding:10px;
      display:none;grid-template-columns:repeat(3,1fr);gap:8px;box-shadow:var(--shadow);
    }
    .mobile-actions button,.mobile-actions .filelabel{width:100%;display:flex;justify-content:center;align-items:center;padding:12px 10px}

    .toast{
      position:fixed;right:18px;bottom:18px;z-index:40;
      background:#111827;color:#fff;padding:12px 14px;border-radius:16px;
      box-shadow:var(--shadow);opacity:0;transform:translateY(8px);pointer-events:none;
      transition:.22s ease;max-width:320px
    }
    .toast.show{opacity:1;transform:translateY(0)}

    @media (max-width:980px){
      .hero,.grid2,.coach-grid,.program-grid,.grid3,.cards4{grid-template-columns:1fr}
      .record-grid{grid-template-columns:1fr}
      .exercise-body{grid-template-columns:1fr}
      .measure-row{grid-template-columns:repeat(2,1fr)}
      .actions{display:none}
      .mobile-actions{display:grid}
    }
    @media (max-width:720px){
      h2{font-size:24px}
      .exercise-top{grid-template-columns:78px 1fr}
      .suggestion{grid-column:1/-1}
      .controls,.cols3,.cols4{grid-template-columns:1fr 1fr}
    }
    @media (max-width:520px){
      .wrap{padding:0 14px}
      .topbar{align-items:flex-start}
      .hero-main{min-height:190px}
      .hero-title{font-size:26px}
      .cards4,.controls,.cols2,.cols3,.cols4,.measure-row{grid-template-columns:1fr}
      .exercise-footer{flex-direction:column;align-items:flex-start}
      .log-item{flex-direction:column}
      .measure-row{padding:14px}
    }
  
    /* --- V3 : mode séance guidée --- */
    .guided-shell{display:grid;gap:16px}
    .guided-card{
      min-height:560px;
      padding:22px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:18px;
      background:
        radial-gradient(circle at 95% 5%, rgba(255,255,255,.24), transparent 28%),
        linear-gradient(135deg,#1d4ed8,#7c3aed);
      color:#fff;
      border-radius:30px;
      overflow:hidden;
      position:relative;
      box-shadow:0 22px 60px rgba(37,99,235,.22);
    }
    .guided-card::before{
      content:"";
      position:absolute;
      width:360px;height:360px;border-radius:999px;
      background:rgba(255,255,255,.12);
      right:-120px;top:-160px;
    }
    .guided-card::after{
      content:"";
      position:absolute;
      width:220px;height:220px;border-radius:999px;
      background:rgba(255,255,255,.10);
      left:-70px;bottom:-90px;
    }
    .guided-card > *{position:relative;z-index:1}
    .guided-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .guided-pill{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.22);
      color:#fff;border-radius:999px;padding:8px 12px;font-weight:850;font-size:12px;
      backdrop-filter:blur(8px);
    }
    .guided-progress{min-width:190px}
    .guided-progressbar{height:10px;background:rgba(255,255,255,.20);border-radius:999px;overflow:hidden;margin-top:8px}
    .guided-progressbar span{display:block;height:100%;background:#fff;border-radius:999px;transition:.25s ease}
    .guided-main{display:grid;grid-template-columns:.82fr 1.18fr;gap:18px;align-items:center}
    .guided-visual{
      min-height:300px;border-radius:28px;
      display:grid;place-items:center;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.07);
      backdrop-filter:blur(10px);
    }
    .guided-visual .big-icon{font-size:96px;filter:drop-shadow(0 20px 35px rgba(0,0,0,.22))}
    .guided-info h2{font-size:38px;line-height:1;letter-spacing:-.05em;color:#fff;margin-bottom:10px}
    .guided-info p{color:rgba(255,255,255,.82);line-height:1.5}
    .guided-targets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
    .guided-stat{
      padding:14px;border-radius:20px;background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);
    }
    .guided-stat .label{font-size:12px;color:rgba(255,255,255,.72);font-weight:850;text-transform:uppercase;letter-spacing:.04em}
    .guided-stat .value{font-size:26px;font-weight:950;letter-spacing:-.04em;margin-top:4px}
    .guided-controls{
      display:grid;grid-template-columns:1fr 1fr;gap:14px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      padding:16px;border-radius:26px;backdrop-filter:blur(10px);
    }
    .guided-panel{display:grid;gap:12px}
    .guided-control-title{font-weight:900;color:rgba(255,255,255,.85);font-size:13px;text-transform:uppercase;letter-spacing:.06em}
    .rep-stepper{display:grid;grid-template-columns:64px 1fr 64px;gap:10px;align-items:center}
    .rep-stepper button,.rpe-buttons button,.guided-actions button{
      box-shadow:none;border-color:rgba(255,255,255,.22);
      background:rgba(255,255,255,.16);color:#fff;
    }
    .rep-stepper button{height:62px;border-radius:20px;font-size:30px}
    .rep-value{
      height:62px;display:grid;place-items:center;border-radius:22px;
      background:#fff;color:#111827;font-size:34px;font-weight:950;
      font-variant-numeric:tabular-nums;
    }
    .rpe-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .rpe-buttons button{padding:13px 8px}
    .rpe-buttons button.active{background:#fff;color:#111827}
    .guided-load{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }
    .guided-load input{
      background:rgba(255,255,255,.95);
      border-color:rgba(255,255,255,.7);
      margin:0;
      color:#111827;
      font-size:18px;
      font-weight:900;
    }
    .guided-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .guided-actions .main-action{background:#fff;color:#111827;font-size:16px;padding:14px 18px}
    .guided-actions .secondary{background:rgba(255,255,255,.14);color:#fff}
    .rest-overlay{
      position:fixed;inset:0;z-index:100;
      display:none;place-items:center;padding:18px;
      background:rgba(15,23,42,.70);
      backdrop-filter:blur(18px);
    }
    .rest-overlay.show{display:grid}
    .rest-card{
      width:min(460px,100%);
      border-radius:34px;
      padding:28px;
      background:linear-gradient(135deg,#ffffff,#eef4ff);
      color:#111827;
      box-shadow:0 30px 90px rgba(15,23,42,.35);
      text-align:center;
    }
    .timer-ring{
      width:210px;height:210px;margin:22px auto;
      border-radius:999px;
      display:grid;place-items:center;
      background:conic-gradient(#2563eb var(--p,0%), #dbeafe 0);
      position:relative;
    }
    .timer-ring::before{
      content:"";position:absolute;inset:14px;background:#fff;border-radius:999px;
    }
    .timer-text{position:relative;font-size:48px;font-weight:950;letter-spacing:-.05em;font-variant-numeric:tabular-nums}
    .rest-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

function defaultSession(){
  const d = new Date().getDay();
  if(d===1) return "Push";
  if(d===2) return "Pull";
  if(d===3) return "Jambes + abdos";
  if(d===5) return "Haut du corps";
  if(d===6) return "Bras + épaules";
  return "Push";
}
function today(){ return new Date().toISOString().slice(0,10); }
function id(){ return Math.random().toString(36).slice(2,10); }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ state = { ...state, ...JSON.parse(raw), tab: state.tab || "dashboard" }; }catch(e){}
  }
}
function allExercises(){ return Object.values(program).flat(); }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function num(v){ return Number(String(v).replace(",", ".")) || 0; }
function repsArray(log){ return [log.r1,log.r2,log.r3,log.r4].map(num).filter(v=>v!==0); }
function totalReps(log){ return repsArray(log).reduce((a,b)=>a+b,0); }
function findExercise(name){ return allExercises().find(e=>e.name===name); }
function setTab(t){ state.tab=t; render(); }
function exKey(name){ return name.replaceAll(/[^a-zA-Z0-9]/g,"_"); }
function uniqueExerciseLogs(name){ return state.logs.filter(l=>l.exercise===name); }
function sessionClass(session){
  if(session === "Push") return "push";
  if(session === "Pull") return "pull";
  if(session === "Jambes + abdos") return "legs";
  if(session === "Haut du corps") return "upper";
  return "arms";
}
function sessionIcon(session){
  if(session === "Push") return `<span class="session-icon">${iconSvg('chest')}</span>`;
  if(session === "Pull") return `<span class="session-icon">${iconSvg('back')}</span>`;
  if(session === "Jambes + abdos") return `<span class="session-icon">${iconSvg('legs')}</span>`;
  if(session === "Haut du corps") return `<span class="session-icon">${iconSvg('dumbbell')}</span>`;
  return `<span class="session-icon">${iconSvg('shoulders')}</span>`;
}
function muscleIcon(muscle){
  const key = slug(muscle);
  if(key.includes('pec')) return iconSvg('chest');
  if(key.includes('dos')) return iconSvg('back');
  if(key.includes('epaules') || key.includes('épaules')) return iconSvg('shoulders');
  if(key.includes('biceps')) return iconSvg('biceps');
  if(key.includes('triceps')) return iconSvg('triceps');
  if(key.includes('jambes')) return iconSvg('legs');
  if(key.includes('abdos')) return iconSvg('abs');
  if(key.includes('deltoide') || key.includes('deltoïde')) return iconSvg('shoulders');
  return iconSvg('dumbbell');
}
function muscleClass(muscle){
  const key = slug(muscle);
  if(key.includes('pec')) return 'visual-pecs';
  if(key.includes('dos')) return 'visual-dos';
  if(key.includes('epaules') || key.includes('épaules')) return 'visual-epaules';
  if(key.includes('biceps')) return 'visual-biceps';
  if(key.includes('triceps')) return 'visual-triceps';
  if(key.includes('jambes')) return 'visual-jambes';
  if(key.includes('abdos')) return 'visual-abdos';
  if(key.includes('deltoide') || key.includes('deltoïde')) return 'visual-deltoide-posterieur';
  return 'visual-pecs';
}
function slug(str){
  return String(str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-');
}
function pill(text, cls=''){ return `<span class="pill ${cls}">${escapeHtml(text)}</span>`; }
function showToast(message){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = message;
  t.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(()=>t.classList.remove('show'), 2300);
}

function actionFor(log, ex){
  const reps = repsArray(log);
  if(!reps.length) return ["À remplir", ""];
  const sets = ex?.sets || reps.length;
  const max = ex?.max || 12;
  const min = ex?.min || 8;
  const rpe = num(log.rpe);
  const allMax = reps.length >= Math.min(sets,reps.length) && reps.slice(0,sets).every(r => r >= max);
  const low = reps.some(r => r < min);
  if(rpe >= state.settings.deloadRpe && low) return ["Alléger / revoir forme", "red"];
  if(allMax && rpe <= 9) return ["Augmenter", "green"];
  if(allMax && rpe >= 10) return ["Conserver", "amber"];
  return ["Conserver", ""];
}

function nextLoad(exName){
  const recent = [...state.logs].reverse().find(l => l.exercise === exName && num(l.load)>0);
  if(!recent) return "—";
  const ex = findExercise(exName);
  const [act] = actionFor(recent, ex);
  const cur = num(recent.load);
  const inc = num(state.settings.loadIncrement) || 2;
  if(act === "Augmenter") return `${cur + inc} kg`;
  if(act === "Alléger / revoir forme") return `${Math.max(0, cur - inc)} kg`;
  return `${cur} kg`;
}

function lastLogForExercise(exName){
  return [...state.logs].reverse().find(l=>l.exercise===exName);
}

function estimateSessionDuration(session){
  const list = program[session] || [];
  let minTotal = 0;
  list.forEach(ex => {
    minTotal += ex.sets * 1.2;
    if(ex.rest.includes('120')) minTotal += ex.sets * 1.5;
    else if(ex.rest.includes('90')) minTotal += ex.sets * 1.2;
    else minTotal += ex.sets * 0.8;
  });
  return Math.round(minTotal);
}

function sessionsLast7Days(){
  const threshold = Date.now() - 7*24*3600*1000;
  return state.logs.filter(l=>new Date(l.date).getTime() >= threshold).length;
}
function uniqueSessionDaysLast7(){
  const threshold = Date.now() - 7*24*3600*1000;
  return new Set(state.logs.filter(l=>new Date(l.date).getTime() >= threshold).map(l=>l.date)).size;
}
function latestMeasurement(){ return [...state.measurements].reverse().find(m => num(m.weight) || num(m.waist)); }
function latestWeight(){ const m = latestMeasurement(); return m && num(m.weight) ? `${num(m.weight)} kg` : '—'; }

function weeklyVolume(){
  const res = {};
  allExercises().forEach(e => res[e.muscle] = (res[e.muscle] || 0) + e.sets);
  return Object.entries(res).map(([muscle,sets]) => ({muscle,sets})).sort((a,b)=>b.sets-a.sets);
}

function records(){
  return allExercises().map(ex => {
    const logs = state.logs.filter(l=>l.exercise===ex.name);
    return {
      name: ex.name,
      load: Math.max(0, ...logs.map(l=>num(l.load))),
      reps: Math.max(0, ...logs.map(totalReps)),
      count: logs.length
    };
  }).sort((a,b)=> (b.reps+b.load) - (a.reps+a.load));
}

function recentLogs(limit=5){ return [...state.logs].reverse().slice(0,limit); }

function compareLastTwo(exerciseName){
  const logs = [...state.logs].filter(l=>l.exercise===exerciseName).slice(-2);
  if(logs.length < 2) return null;
  const [prev, curr] = logs;
  const loadDiff = num(curr.load) - num(prev.load);
  const repsDiff = totalReps(curr) - totalReps(prev);
  return { prev, curr, loadDiff, repsDiff };
}

function coachInsights(){
  const insights = [];
  const targetSessions = 5;
  const recentDays = uniqueSessionDaysLast7();
  if(recentDays >= 4){
    insights.push({type:'regularity', title:'Très bonne régularité', text:`Tu as déjà validé ${recentDays} jours d'entraînement sur les 7 derniers jours. Continue comme ça.`, badge:'Régularité', icon:'📅'});
  } else {
    insights.push({type:'regularity', title:'Régularité à sécuriser', text:`Tu as validé ${recentDays} jours d'entraînement sur les 7 derniers jours. Vise ${targetSessions} jours sur la semaine complète.`, badge:'Régularité', icon:'📅'});
  }

  allExercises().forEach(ex => {
    const cmp = compareLastTwo(ex.name);
    if(!cmp) return;
    if(cmp.loadDiff > 0 || cmp.repsDiff >= 2){
      insights.push({type:'progress', title:`${ex.name} progresse`, text:`Bonne tendance sur ${ex.name} : ${cmp.loadDiff>0 ? `+${cmp.loadDiff} kg` : `+${cmp.repsDiff} reps`} par rapport à la fois précédente.`, badge:'Progression', icon:'📈'});
    }
  });

  const highRpe = recentLogs(10).filter(l=>num(l.rpe)>=10);
  if(highRpe.length){
    const l = highRpe[0];
    insights.push({type:'fatigue', title:'Fatigue élevée repérée', text:`${l.exercise} a été noté RPE ${l.rpe}. Garde la charge stable ou prolonge un peu le repos.`, badge:'Fatigue', icon:'😮‍💨'});
  }

  const vol = weeklyVolume();
  if(vol.length){
    insights.push({type:'volume', title:'Répartition du volume', text:`Le volume le plus élevé du programme est actuellement sur ${vol[0].muscle} (${vol[0].sets} séries). Vérifie que la récupération suit.`, badge:'Volume', icon:'📦'});
  }

  if(state.measurements.length >= 2){
    const recent = state.measurements.filter(m=>num(m.weight) || num(m.waist)).slice(-2);
    if(recent.length === 2){
      const [a,b] = recent;
      const weightDiff = +(num(b.weight)-num(a.weight)).toFixed(1);
      const waistDiff = +(num(b.waist)-num(a.waist)).toFixed(1);
      if(weightDiff <= 0 && waistDiff < 0){
        insights.push({type:'measure', title:'Tendance mensurations positive', text:`Poids ${weightDiff === 0 ? 'stable' : weightDiff+' kg'} et tour de taille ${waistDiff} cm : très bon signal.`, badge:'Mesures', icon:'📏'});
      } else {
        insights.push({type:'measure', title:'Mensurations à suivre', text:`Dernière évolution : poids ${weightDiff >= 0 ? '+' : ''}${weightDiff} kg, tour de taille ${waistDiff >= 0 ? '+' : ''}${waistDiff} cm. Continue à surveiller la tendance globale.`, badge:'Mesures', icon:'📏'});
      }
    }
  }

  if(!insights.length){
    insights.push({type:'focus', title:'Commence à logger quelques séances', text:'Dès que tu auras 2 ou 3 séances enregistrées, le coach local pourra dégager des tendances simples.', badge:'Conseil', icon:'✨'});
  }

  return insights.slice(0,7);
}

  const map = {
    dashboard:'dashboard',
    today:'play',
    guided:'play',
    coach:'coach',
    recovery:'ruler',
    log:'book',
    stats:'stats',
    measures:'ruler',
    program:'book'
  };
  return map[key] || 'home';
}
function renderTabs(){
  document.getElementById('tabs').innerHTML = tabs.map(([key,label]) =>
    `<button class="tab ${state.tab===key?'active':''}" onclick="setTab('${key}')"><span class="nav-icon">${iconSvg(tabIcon(key))}</span><span>${label}</span></button>`
  ).join('');
}
function renderBottomNav(){
  const items = [
    ['dashboard','Accueil'],
    ['guided','Séance'],
    ['coach','Coach'],
    ['recovery','Récup'],
    ['stats','Stats']
  ];
  const nav = document.getElementById('mobileBottomNav');
  if(!nav) return;
  nav.innerHTML = items.map(([key,label]) => `
    <button class="bottom-item ${state.tab===key?'active':''}" onclick="setTab('${key}')">
      <span class="nav-icon">${iconSvg(tabIcon(key))}</span>
      <span>${label}</span>
    </button>
  `).join('');
}


function render(){
  renderTabs();
  renderBottomNav();
  const logo = document.getElementById('logoIcon'); if(logo) logo.innerHTML = iconSvg('dumbbell');
  const app = document.getElementById('app');
  if(state.tab === 'dashboard') app.innerHTML = viewDashboard();
  if(state.tab === 'today') app.innerHTML = viewToday();
  if(state.tab === 'guided') { app.innerHTML = viewGuided(); setTimeout(updateGuidedTimerUI, 0); }
  if(state.tab === 'coach') app.innerHTML = viewCoach();
  if(state.tab === 'recovery') app.innerHTML = viewRecovery();
  if(state.tab === 'log') app.innerHTML = viewLog();
  if(state.tab === 'stats'){ app.innerHTML = viewStats(); setTimeout(drawWeightChart,0); }
  if(state.tab === 'measures') app.innerHTML = viewMeasures();
  if(state.tab === 'program') app.innerHTML = viewProgram();
  postRenderEnhance();
  save();
}

  if(session === 'Pull') return 'linear-gradient(135deg,#6366f1,#8b5cf6,#7c3aed)';

  return 'linear-gradient(135deg,#ec4899,#db2777,#8b5cf6)';
}

function quickFill(name){
  const recent = [...state.logs].reverse().find(l => l.exercise === name);
  if(!recent) return showToast('Aucun historique pour cet exercice.');
  const k = exKey(name);
  ['load','r1','r2','r3','r4','rpe'].forEach(f => {
    const el = document.getElementById(`${k}_${f}`);
    if(el) el.value = recent[f] || '';
  });
  showToast(`Dernier log de ${name} recopié.`);
}

function saveExercise(name){
  const k = exKey(name);
  const ex = findExercise(name);
  const load = document.getElementById(`${k}_load`)?.value || '';
  const r1 = document.getElementById(`${k}_r1`)?.value || '';
  const r2 = document.getElementById(`${k}_r2`)?.value || '';
  const r3 = document.getElementById(`${k}_r3`)?.value || '';
  const r4 = document.getElementById(`${k}_r4`)?.value || '';
  const rpe = document.getElementById(`${k}_rpe`)?.value || '';
  if(!load && !r1 && !r2 && !r3 && !r4) return showToast('Ajoute au moins une charge ou une série avant de sauvegarder.');
  const log = { id:id(), date:state.date, session:state.session, exercise:name, muscle:ex?.muscle || '', load, r1, r2, r3, r4, rpe };
  state.logs.push(log);
  ['load','r1','r2','r3','r4','rpe'].forEach(f => {

function drawWeightChart(){
  const canvas = document.getElementById('weightChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const data = state.measurements.filter(m=>num(m.weight)||num(m.waist)).slice(-20);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<6;i++){
    const y = 40 + i*48;
    ctx.strokeStyle = '#e6eaf2'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(46,y); ctx.lineTo(canvas.width-18,y); ctx.stroke();
  }
  ctx.fillStyle = '#64748b'; ctx.font = '13px system-ui';
  if(data.length < 2){
    ctx.fillText('Pas assez de données.', 50, 160);
    return;
  }
  const vals = data.flatMap(m => [num(m.weight)||null, num(m.waist)||null]).filter(Boolean);
  const min = Math.min(...vals) - 2;
  const max = Math.max(...vals) + 2;
  function x(i){ return 58 + i * ((canvas.width - 96) / (data.length - 1)); }
  function y(v){ return 278 - ((v-min) / (max-min || 1))*228; }
  function line(key,color){
    ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.beginPath();
    let started = false;
    data.forEach((m,i)=>{
      const v = num(m[key]); if(!v) return;
      if(!started){ ctx.moveTo(x(i), y(v)); started=true; } else ctx.lineTo(x(i), y(v));
    });
    ctx.stroke();
    data.forEach((m,i)=>{
      const v = num(m[key]); if(!v) return;
      ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x(i), y(v), 4, 0, Math.PI*2); ctx.fill();
    });
  }
  line('weight','#2563eb');
  line('waist','#10b981');
  ctx.fillStyle='#2563eb'; ctx.fillText('Poids',58,24);
  ctx.fillStyle='#10b981'; ctx.fillText('Taille',115,24);
  ctx.fillStyle='#64748b';
  data.forEach((m,i)=>{ if(i % Math.ceil(data.length/5) === 0) ctx.fillText((m.date||'').slice(5), x(i)-12, 308); });
}

/* --- V3 : logique séance guidée --- */
let guided = {
  active:false,
  session:null,
  exerciseIndex:0,
  setIndex:0,
  reps:10,
  load:"",
  rpe:8,
  entries:[],
  startTime:null,
  finished:false,
  resting:false,
  restRemaining:0,
  restTotal:0,
  timer:null
};

function startGuidedSession(sessionName){
  guided = {
    active:true,
    session: sessionName || state.session,
    exerciseIndex:0,
    setIndex:0,
    reps: defaultRepsFor((program[sessionName || state.session] || [])[0]),
    load:"",
    rpe:8,
    entries:[],
    startTime: Date.now(),
    finished:false,
    resting:false,
    restRemaining:0,
    restTotal:0,
    timer:null
  };
  state.session = guided.session;
  state.tab = "guided";
  render();
  showToast("Séance guidée démarrée.");
}

function resetGuidedSession(){
  stopRestTimer();
  guided.active = false;
  guided.finished = false;
  guided.entries = [];
  guided.exerciseIndex = 0;
  guided.setIndex = 0;
  guided.reps = 10;
  guided.load = "";
  guided.rpe = 8;
  render();
}

function currentGuidedExercise(){
  if(!guided.active) return null;
  const list = guidedExerciseList ? guidedExerciseList() : (program[guided.session] || []);
  return list[guided.exerciseIndex] || null;
}

function defaultRepsFor(ex){
  if(!ex) return 10;
  return ex.min || 10;
}

function adjustGuidedReps(delta){
  guided.reps = Math.max(0, Number(guided.reps || 0) + delta);
  updateGuidedTimerUI();
  render();
}

function setGuidedRpe(v){
  guided.rpe = v;
  render();
}

function setGuidedLoad(v){
  guided.load = v;
}

function guidedRestSeconds(ex){
  if(!ex) return 60;
  const txt = ex.rest || "";
  if(txt.includes("120")) return 120;
  if(txt.includes("90")) return 90;
  if(txt.includes("75")) return 75;
  if(txt.includes("60")) return 60;
  return 60;
}

function validateGuidedSet(){
  const ex = currentGuidedExercise();
  if(!ex) return;
  const loadEl = document.getElementById("guidedLoad");
  const load = loadEl ? loadEl.value : guided.load;
  guided.load = load || guided.load || "";
  const entry = {
    id:id(),
    date:state.date,
    session:guided.session,
    exercise:ex.name,
    muscle:ex.muscle,
    load:guided.load,
    r1: guided.setIndex === 0 ? String(guided.reps) : "",
    r2: guided.setIndex === 1 ? String(guided.reps) : "",
    r3: guided.setIndex === 2 ? String(guided.reps) : "",
    r4: guided.setIndex === 3 ? String(guided.reps) : "",
    rpe:String(guided.rpe),
    guided:true,
    setNumber: guided.setIndex + 1
  };
  guided.entries.push(entry);

  const rest = guidedRestSeconds(ex);
  const isLastSetOfExercise = guided.setIndex >= ex.sets - 1;
  const isLastExercise = guided.exerciseIndex >= (program[guided.session] || []).length - 1;

  if(isLastSetOfExercise && isLastExercise){
    finishGuidedSession();
  } else {
    startRestTimer(rest);
  }
}

function nextGuidedStep(){
  const ex = currentGuidedExercise();
  if(!ex) return;
  if(guided.setIndex < ex.sets - 1){
    guided.setIndex += 1;
  } else {
    guided.exerciseIndex += 1;
    guided.setIndex = 0;
  }
  const nextEx = currentGuidedExercise();
  guided.reps = defaultRepsFor(nextEx);
  if(nextEx){
    const last = lastLogForExercise(nextEx.name);
    guided.load = last?.load || "";
  }
  guided.resting = false;
  stopRestTimer();
  render();
}

function startRestTimer(seconds){
  guided.resting = true;
  guided.restTotal = seconds;
  guided.restRemaining = seconds;
  showRestOverlay();
  stopRestTimer();
  guided.timer = setInterval(() => {
    guided.restRemaining -= 1;
    updateRestOverlay();
    if(guided.restRemaining <= 0){
      stopRestTimer();
      try{ if(navigator.vibrate) navigator.vibrate([120,80,120]); }catch(e){}
      showToast("Repos terminé.");
    }
  }, 1000);
  updateRestOverlay();
}

function stopRestTimer(){
  if(guided.timer){
    clearInterval(guided.timer);
    guided.timer = null;
  }
}

function addRest(seconds){
  guided.restRemaining += seconds;
  guided.restTotal += seconds;
  updateRestOverlay();
}

function skipRest(){
  stopRestTimer();
  hideRestOverlay();
  nextGuidedStep();
}

function showRestOverlay(){
  let overlay = document.getElementById("restOverlay");
  if(!overlay){
    overlay = document.createElement("div");
    overlay.id = "restOverlay";
    overlay.className = "rest-overlay";
    document.body.appendChild(overlay);
  }
  overlay.classList.add("show");
  updateRestOverlay();
}

function hideRestOverlay(){
  const overlay = document.getElementById("restOverlay");
  if(overlay) overlay.classList.remove("show");
}

function formatTime(sec){
  sec = Math.max(0, Number(sec || 0));
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function updateRestOverlay(){
  const overlay = document.getElementById("restOverlay");
  if(!overlay) return;
  const pct = guided.restTotal ? Math.round(((guided.restTotal - guided.restRemaining) / guided.restTotal) * 100) : 0;
  overlay.innerHTML = `
    <div class="rest-card">
      <span class="pill blue">Repos</span>
      <h2 style="margin-top:12px">Respire, récupère.</h2>
      <div class="timer-ring" style="--p:${pct}%">
        <div class="timer-text">${formatTime(guided.restRemaining)}</div>
      </div>
      <div class="rest-actions">
        <button onclick="addRest(30)">+30 s</button>
        <button class="primary" onclick="skipRest()">Passer</button>
      </div>
    </div>
  `;
}

function updateGuidedTimerUI(){
  /* hook conservé pour éviter les erreurs si render le rappelle */
}

function finishGuidedSession(){
  stopRestTimer();
  hideRestOverlay();
  // Fusionne les séries guidées en lignes par exercice pour le journal classique.
  const grouped = {};
  guided.entries.forEach(e => {
    if(!grouped[e.exercise]){
      grouped[e.exercise] = {
        id:id(),
        date:state.date,
        session:guided.session,
        exercise:e.exercise,
        muscle:e.muscle,
        load:e.load,
        r1:"",
        r2:"",
        r3:"",
        r4:"",
        rpe:e.rpe,
        guided:true
      };
    }
    grouped[e.exercise][`r${e.setNumber}`] = e[`r${e.setNumber}`];
    grouped[e.exercise].rpe = e.rpe;
    grouped[e.exercise].load = e.load || grouped[e.exercise].load;
  });
  state.logs.push(...Object.values(grouped));
  save();
  guided.finished = true;
  guided.active = false;
  state.tab = "guided";
  render();
  showToast("Séance sauvegardée.");
}

function guidedSummary(){
  const duration = guided.startTime ? Math.max(1, Math.round((Date.now() - guided.startTime) / 60000)) : 0;
  const sets = guided.entries.length;
  const volume = guided.entries.reduce((sum,e)=> sum + (num(e.load) * num(e[`r${e.setNumber}`])), 0);
  const exercises = new Set(guided.entries.map(e=>e.exercise)).size;
  return {duration, sets, volume: Math.round(volume), exercises};
}

function exerciseHistory(name){
  return state.logs.filter(l => l.exercise === name);
}
function lastTwoLogs(name){
  return exerciseHistory(name).slice(-2);
}
function bestLogFor(name){
  const logs = exerciseHistory(name);
  if(!logs.length) return null;
  return logs.slice().sort((a,b) => (num(b.load)*totalReps(b) + totalReps(b)) - (num(a.load)*totalReps(a) + totalReps(a)))[0];
}
function nextTargetForExercise(ex){
  const logs = exerciseHistory(ex.name);
  const last = logs[logs.length - 1];
  if(!last) return {
    label:"Premier objectif",
    text:`Démarre à une charge confortable et vise ${ex.sets}×${ex.min}.`,
    load:"—",
    reps:Array(ex.sets).fill(ex.min)
  };

  const [action] = actionFor(last, ex);
  const currentLoad = num(last.load);
  const reps = [last.r1,last.r2,last.r3,last.r4].map(num).slice(0, ex.sets);
  const cleanReps = reps.map(r => r || ex.min);
  const inc = isIsolation(ex) ? 1 : 2;

  if(action === "Augmenter"){
    return {
      label:"Augmenter",
      text:`Passe à ${currentLoad ? currentLoad + inc : "une charge supérieure"} kg et vise ${ex.sets}×${ex.min}.`,
      load: currentLoad ? `${currentLoad + inc} kg` : "charge supérieure",
      reps:Array(ex.sets).fill(ex.min)
    };
  }
  if(action === "Alléger / revoir forme"){
    return {
      label:"Alléger / technique",
      text:`Réduis légèrement ou garde ${currentLoad || "la charge"} kg avec exécution plus propre.`,
      load: currentLoad ? `${Math.max(0,currentLoad-inc)}–${currentLoad} kg` : "à ajuster",
      reps:Array(ex.sets).fill(ex.min)
    };
  }

  // Objectif +1 rep totale, en augmentant la première série non au max.
  const target = cleanReps.slice();
  const idx = target.findIndex(r => r < ex.max);
  if(idx >= 0) target[idx] += 1;
  return {
    label:"Conserver",
    text:`Garde ${currentLoad || "la charge"} kg et vise +1 rep totale.`,
    load: currentLoad ? `${currentLoad} kg` : "même charge",
    reps:target
  };
}
function isIsolation(ex){
  const m = slug(ex.muscle);
  return m.includes("biceps") || m.includes("triceps") || m.includes("epaules") || m.includes("deltoide") || m.includes("abdos");
}
function exerciseMistakes(ex){
  const n = slug(ex.name);
  if(n.includes("rowing")) return ["Tirer avec le biceps au lieu du dos", "Tourner le buste en fin de tirage", "Réduire l’amplitude pour charger trop lourd"];
  if(n.includes("militaire")) return ["Cambrer excessivement", "Verrouiller trop violemment en haut", "Descendre trop peu"];
  if(n.includes("decline") || n.includes("developpe-decline")) return ["Épaules qui remontent", "Descente trop rapide", "Coudes trop ouverts"];
  if(n.includes("goblet")) return ["Amplitude trop courte", "Genoux qui rentrent", "Buste qui s’effondre"];
  if(n.includes("fentes")) return ["Pas trop court", "Perte d’équilibre", "Genou avant qui rentre"];
  if(n.includes("curl")) return ["Élan avec le dos", "Coudes qui avancent trop", "Descente non contrôlée"];
  if(n.includes("elevations")) return ["Trop lourd", "Trapèzes qui prennent tout", "Élan du buste"];
  if(n.includes("triceps")) return ["Coudes qui s’écartent", "Amplitude partielle", "Charge trop lourde"];
  if(n.includes("gainage")) return ["Bassin trop haut", "Bas du dos cambré", "Respiration bloquée"];
  return ["Charge trop lourde", "Amplitude raccourcie", "Perte de contrôle"];
}
function exerciseSecondary(ex){
  const m = slug(ex.muscle);
  if(m.includes("pec")) return "triceps, épaules antérieures";

  if(m.includes("epaules") || m.includes("deltoide")) return "trapèzes, triceps ou haut du dos selon mouvement";

  if(m.includes("triceps")) return "épaules, gainage";

function downloadCSV(filename, rows){
  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\n");

/* --- V6 : récupération et modes intelligents --- */
function safeRecovery(){ if(!Array.isArray(state.recovery)) state.recovery = []; return state.recovery; }
function latestRecovery(){ return [...safeRecovery()].reverse().find(r => r.date); }
function readinessScore(){
  const r = latestRecovery();
  if(!r) return 72;
  const energy = num(r.energy) || 3;
  const sleep = num(r.sleepQuality) || 3;
  const soreness = num(r.soreness) || 3;
  const pain = num(r.pain) || 1;
  const motivation = num(r.motivation) || 3;
  let score = (energy*18) + (sleep*16) + (motivation*12) + ((6-soreness)*12) + ((6-pain)*10);
  return Math.max(15, Math.min(100, Math.round(score)));
}
function recoveryAdvice(){
  const score = readinessScore();
  const r = latestRecovery();
  if(!r) return {tone:"blue", title:"Récupération à renseigner", text:"Ajoute un check rapide énergie/sommeil/courbatures pour personnaliser les recommandations."};
  if(num(r.pain) >= 4) return {tone:"red", title:"Douleur élevée", text:"Évite d’augmenter les charges aujourd’hui. Privilégie technique, amplitude propre ou séance allégée."};
  if(score >= 78) return {tone:"green", title:"Bonne disponibilité", text:"Tu peux faire une séance normale. Augmente seulement les exercices validés à RPE raisonnable."};
  if(score >= 55) return {tone:"amber", title:"Disponibilité moyenne", text:"Fais la séance prévue, mais garde 1–2 reps en réserve et ne force pas les progressions."};
  return {tone:"red", title:"Récupération basse", text:"Fais une séance courte ou deload. Objectif : entretien, technique, pas de record."};
}

  const threshold = Date.now() - 7*24*3600*1000;

    {session:"Haut du corps", muscles:["Dos","Pecs","Épaules"]},
    {session:"Bras + épaules", muscles:["Biceps","Triceps","Épaules","Deltoïde postérieur"]}
  ];
  const scored = needs.map(n => ({session:n.session, missing:n.muscles.filter(m => !covered.has(m)).length})).sort((a,b) => b.missing - a.missing);
  return scored[0]?.missing ? scored[0].session : defaultSession();
}
function shortListForSession(sessionName){
  const list = program[sessionName] || [];
  const priority = list.filter(e => e.priority === "Haute");
  const base = priority.length ? priority : list;
  return base.slice(0, Math.min(3, base.length));
}
function deloadListForSession(sessionName){
  return (program[sessionName] || []).map(e => ({...e, sets: Math.max(2, Math.ceil(e.sets * 0.65)), max: Math.max(e.min, Math.floor(e.max * 0.85)), deload:true}));
}
function startGuidedSessionMode(sessionName, mode){
  const original = program[sessionName || state.session] || [];
  let list = original;
  if(mode === "short") list = shortListForSession(sessionName || state.session);
  if(mode === "deload") list = deloadListForSession(sessionName || state.session);
  guided = {
    active:true,
    session: sessionName || state.session,
    mode: mode || "normal",
    exerciseList: list,
    exerciseIndex:0,
    setIndex:0,
    reps: defaultRepsFor(list[0]),
    load:"",
    rpe: mode === "deload" ? 7 : 8,
    entries:[],
    startTime:Date.now(),
    finished:false,
    resting:false,
    restRemaining:0,
    restTotal:0,
    timer:null
  };
  state.session = guided.session;
  state.tab = "guided";
  render();
  showToast(mode === "short" ? "Séance courte lancée." : mode === "deload" ? "Mode deload lancé." : "Séance guidée lancée.");
}
function startGuidedSession(sessionName){ startGuidedSessionMode(sessionName || state.session, "normal"); }
function currentGuidedExercise(){
  if(!guided.active) return null;
  const list = guided.exerciseList || program[guided.session] || [];
  return list[guided.exerciseIndex] || null;
}
function guidedExerciseList(){ return guided.exerciseList || program[guided.session] || []; }
function nextGuidedStep(){
  const ex = currentGuidedExercise();
  if(!ex) return;
  if(guided.setIndex < ex.sets - 1){ guided.setIndex += 1; }
  else { guided.exerciseIndex += 1; guided.setIndex = 0; }
  const nextEx = currentGuidedExercise();
  guided.reps = defaultRepsFor(nextEx);
  if(nextEx){
    const last = lastLogForExercise(nextEx.name);
    guided.load = last?.load || "";
  }
  guided.resting = false;
  stopRestTimer();
  hideRestOverlay();
  render();
}
function finishGuidedSession(){
  stopRestTimer();
  hideRestOverlay();
  const grouped = {};
  guided.entries.forEach(e => {
    if(!grouped[e.exercise]){
      grouped[e.exercise] = {
        id:id(), date:state.date, session:guided.session, exercise:e.exercise, muscle:e.muscle,
        load:e.load, r1:"", r2:"", r3:"", r4:"", rpe:e.rpe, guided:true, mode: guided.mode || "normal"
      };
    }
    grouped[e.exercise][`r${e.setNumber}`] = e[`r${e.setNumber}`];
    grouped[e.exercise].rpe = e.rpe;
    grouped[e.exercise].load = e.load || grouped[e.exercise].load;
  });
  state.logs.push(...Object.values(grouped));
  save();
  guided.finished = true;
  guided.active = false;
  state.tab = "guided";
  render();
  showToast("Séance sauvegardée.");
}
function addRecovery(){
  safeRecovery().push({id:id(), date:today(), energy:"3", sleepQuality:"3", soreness:"3", pain:"1", motivation:"3", note:""});
  render();
  showToast("Check récupération ajouté.");
}
function updateRecovery(rid, key, value){
  safeRecovery();
  state.recovery = state.recovery.map(r => r.id === rid ? {...r, [key]:value} : r);
  save();
}
function deleteRecovery(rid){
  safeRecovery();
  state.recovery = state.recovery.filter(r => r.id !== rid);
  render();
  showToast("Check supprimé.");
}
function ratingButtons(rid, key, value){
  return `<div class="rating-buttons">${[1,2,3,4,5].map(v => `<button class="${String(value)===String(v) ? 'active' : ''}" onclick="updateRecovery('${rid}','${key}','${v}'); render()">${v}</button>`).join("")}</div>`;
}
function coverageView(){
  const covered = musclesCoveredThisWeek();
  const muscles = [["Pecs","chest"],["Dos","back"],["Épaules","shoulders"],["Biceps","biceps"],["Triceps","triceps"],["Jambes","legs"],["Abdos","abs"]];
  return `<div class="coverage-grid">${muscles.map(([m,ic]) => `<div class="coverage-pill ${covered.has(m) ? 'done' : ''}">
    <div class="icon">${iconSvg(ic)}</div><div class="name">${m}</div><div class="small muted">${covered.has(m) ? 'fait' : 'à faire'}</div>
  </div>`).join("")}</div>`;
}
function miniCalendar(){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(Date.now() - i*24*3600*1000);
    const iso = d.toISOString().slice(0,10);
    const logs = state.logs.filter(l => l.date === iso);
    days.push({iso, label:d.toLocaleDateString('fr-FR',{weekday:'short', day:'2-digit'}), logs});
  }
  return `<div class="mini-calendar">${days.map(d => `<div class="cal-day ${d.logs.length ? 'has' : ''}">
    <strong>${d.label}</strong>
    <div class="muted">${d.logs.length ? `${new Set(d.logs.map(l=>l.session)).size} séance` : 'repos'}</div>
    ${d.logs.length ? `<span class="cal-tag">${escapeHtml(d.logs[0].session)}</span>` : ''}
  </div>`).join("")}</div>`;
}
function viewRecovery(){
  const rec = safeRecovery();
  const advice = recoveryAdvice();
  const score = readinessScore();
  const suggested = recommendedSessionByCoverage();
  return `
    <section class="grid">
      <div class="card hero">
        <div class="hero-main" style="background:linear-gradient(135deg,#0ea5e9,#14b8a6,#22c55e)">
          <span class="eyebrow">${iconSvg('ruler')} Récupération</span>
          <div class="hero-title">Adapte la séance à ton état réel.</div>
          <div class="hero-desc">Énergie, sommeil, courbatures et douleur permettent de choisir entre séance normale, courte ou deload.</div>
          <div class="hero-actions">
            <button onclick="addRecovery()">Ajouter un check</button>
            <button class="warn" onclick="startGuidedSessionMode('${suggested}','short')">Séance courte</button>
            <button class="warn" onclick="startGuidedSessionMode('${suggested}','deload')">Deload</button>
          </div>
        </div>
        <div class="hero-side">
          <div class="mini-card">
            <div class="section-head"><h3>Readiness</h3>${pill(score + '/100', score >= 78 ? 'green' : score >= 55 ? 'amber' : 'red')}</div>
            <div class="readiness-ring" style="--score:${score}%"><div class="readiness-score"><b>${score}</b><span class="small muted">/100</span></div></div>
          </div>
          <div class="mini-card">
            <div class="section-head"><h3>${escapeHtml(advice.title)}</h3>${pill('Conseil','teal')}</div>
            <p>${escapeHtml(advice.text)}</p>
          </div>
        </div>
      </div>

      <div class="smart-grid">
        <div class="smart-card featured">
          <div class="section-head">
            <div><h2>Que faire aujourd’hui ?</h2><p class="muted small">Suggestion basée sur muscles travaillés + récupération.</p></div>
            ${pill(suggested,'blue')}
          </div>
          <p>Recommandation : <b>${escapeHtml(suggested)}</b>.</p>
          <div class="smart-actions">
            <button class="primary" onclick="startGuidedSessionMode('${suggested}','normal')">Séance normale</button>
            <button onclick="startGuidedSessionMode('${suggested}','short')">Version courte</button>
            <button class="warn" onclick="startGuidedSessionMode('${suggested}','deload')">Deload</button>
          </div>
        </div>
        <div class="smart-card">
          <div class="section-head"><div><h2>Couverture muscles</h2><p class="muted small">7 derniers jours.</p></div></div>
          ${coverageView()}
        </div>
      </div>

      <div class="card pad">
        <div class="section-head">
          <div><h2>Calendrier rapide</h2><p class="muted small">Vue simple des 7 derniers jours.</p></div>
        </div>
        ${miniCalendar()}
      </div>

      <div class="card pad">
        <div class="section-head">
          <div><h2>Checks récupération</h2><p class="muted small">1 = bas/faible, 5 = haut/fort. Pour douleur, 5 = douleur élevée.</p></div>
          <button onclick="addRecovery()">Ajouter</button>
        </div>
        <div class="grid">
          ${rec.length ? [...rec].reverse().map(r => `
            <div class="recovery-row">
              <label>Date<input type="date" value="${escapeHtml(r.date)}" onchange="updateRecovery('${r.id}','date',this.value)"></label>
              <label>Énergie${ratingButtons(r.id,'energy',r.energy)}</label>
              <label>Sommeil${ratingButtons(r.id,'sleepQuality',r.sleepQuality)}</label>
              <label>Courbatures${ratingButtons(r.id,'soreness',r.soreness)}</label>
              <label>Douleur${ratingButtons(r.id,'pain',r.pain)}</label>
              <label>Motivation${ratingButtons(r.id,'motivation',r.motivation)}</label>
              <button class="danger" onclick="deleteRecovery('${r.id}')">Suppr.</button>
            </div>
          `).join("") : `<div class="empty">Aucun check récupération pour l’instant.</div>`}
        </div>
      </div>
    </section>
  `;
}


function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `carnet-entrainement-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export JSON lancé.');
}

function importData(event){
  const file = event.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(String(reader.result));
      state = { ...state, ...parsed, tab:'dashboard' };
      render();
      showToast('Données importées.');
    }catch(e){
      showToast('Fichier invalide.');
    }
  };
  reader.readAsText(file);
}

function resetData(){
  if(confirm('Effacer toutes les données sauvegardées dans ce navigateur ?')){
    localStorage.removeItem(STORAGE_KEY);
    state.logs = [];
    state.measurements = [];
    state.tab = 'dashboard';
    render();
    showToast('Données effacées.');
  }
}

load();
render();
</script>
